<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat </title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <div id="auth-container" class="auth-screen">
    <div class="auth-card">
      <h2 id="auth-title">Ingresar al Chat</h2>
      <p id="auth-subtitle">Introduce tus datos para unirte a las salas</p>
      
      <form id="auth-form">
        <input type="email" id="email-input" placeholder="Correo electrónico" required>
        
        <input type="password" id="password-input" placeholder="Contraseña (mín. 6 caracteres)" required>
        
        <div id="nickname-group" class="hidden">
          <input type="text" id="username-input" placeholder="Tu Nombre de usuario (Alias)">
        </div>
        
        <button type="submit" id="btn-submit-auth">Entrar</button>
      </form>

      <div class="auth-divider">o también puedes</div>

      <button id="btn-google" type="button" class="btn-google-dark">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
        Continuar con Google
      </button>

      <p class="auth-toggle-text">
        ¿No tienes cuenta? <span id="toggle-auth-mode">Regístrate aquí</span>
      </p>
    </div>
  </div>

  <div id="chat-container" class="chat-screen hidden">
    <aside class="sidebar">
      <div class="user-profile">
        <span class="avatar">👤</span>
        <span id="current-user">Usuario</span>
      </div>
      <h3>Salas Temáticas</h3>
      <ul id="rooms-list">
        <li class="room-item active" data-room="general"># General</li>
        <li class="room-item" data-room="programacion"># Programación</li>
        <li class="room-item" data-room="diseno"># Interfaz</li>
        <li class="room-item" data-room="videojuegos"># Videojuegos</li>
      </ul>
      <h3>Usuarios en Línea</h3>
      <ul id="users-list"></ul>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <h2 id="current-room-title"># General</h2>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Buscar en el historial...">
        </div>
      </header>

      <div id="messages-window" class="messages-container"></div>
      <div id="typing-indicator" class="typing-box"></div>

      <footer class="chat-footer">
        <form id="message-form">
          <button type="button" id="emoji-btn" class="control-btn">😀</button>
          
          <label for="file-input" class="control-btn">📎</label>
          <input type="file" id="file-input" class="hidden" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar">

          <input type="text" id="message-input" placeholder="Escribe un mensaje aquí..." autocomplete="off">
          <button type="submit" id="send-btn">Enviar</button>
        </form>
        <div id="emoji-picker-container" class="hidden"></div>
      </footer>
    </main>
  </div>

  <audio id="notification-sound" src="mensaje.mp3" preload="auto"></audio>

  <script type="module" src="script.js"></script>
</body>
</html>
